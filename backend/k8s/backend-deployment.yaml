apiVersion: apps/v1
kind: Deployment

metadata:
  name: autopilot-backend
  namespace: autopilot

  labels:
    app: autopilot-backend

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: autopilot-backend

  template:

    metadata:

      labels:
        app: autopilot-backend

    spec:

      terminationGracePeriodSeconds: 60

      containers:

      - name: backend

        image: 843141572984.dkr.ecr.eu-north-1.amazonaws.com/autopilot-backend:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 8000

        envFrom:

        - configMapRef:
            name: autopilot-config

        - secretRef:
            name: autopilot-secret

        resources:
          requests:
            cpu: 100m
            memory: 512Mi

          limits:
            cpu: 500m
            memory: 1Gi


        lifecycle:

          preStop:

            exec:

              command:

              - sh
              - -c
              - sleep 15

        securityContext:

          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false

      securityContext:

        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000