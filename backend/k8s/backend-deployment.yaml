apiVersion: apps/v1
kind: Deployment

metadata:
  name: autopilot-backend
  namespace: autopilot

spec:
  replicas: 2

  selector:
    matchLabels:
      app: autopilot-backend

  template:
    metadata:
      labels:
        app: autopilot-backend

    spec:
      containers:

        - name: backend

          image: 843141572984.dkr.ecr.eu-north-1.amazonaws.com/autopilot-backend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: autopilot-config

            - secretRef:
                name: autopilot-secret

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 40
            periodSeconds: 20