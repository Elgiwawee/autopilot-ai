apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:

  name: autopilot-backend-hpa

  namespace: autopilot

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: autopilot-backend

  minReplicas: 2

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70